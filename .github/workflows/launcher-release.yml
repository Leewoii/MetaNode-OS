name: Launcher Installers

on:
  workflow_dispatch:
  push:
    tags:
      - "launcher-v*"

jobs:
  build-launcher:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Verify launcher icons
        shell: pwsh
        run: |
          git rev-parse HEAD
          Get-ChildItem apps/launcher/src-tauri/icons
          if (!(Test-Path apps/launcher/src-tauri/icons/icon.png)) {
            throw "Missing apps/launcher/src-tauri/icons/icon.png"
          }
          if (!(Test-Path apps/launcher/src-tauri/icons/icon.ico)) {
            throw "Missing apps/launcher/src-tauri/icons/icon.ico"
          }
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux desktop dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf
      - run: npm ci
      - name: Build Tauri launcher
        env:
          METANODE_RELEASE_PUBLIC_KEY_BASE64: ${{ secrets.METANODE_RELEASE_PUBLIC_KEY_BASE64 }}
        run: npm --workspace apps/launcher run tauri:build
      - uses: actions/upload-artifact@v4
        with:
          name: metanode-launcher-${{ matrix.os }}
          path: |
            apps/launcher/src-tauri/target/release/bundle/**/*.msi
            apps/launcher/src-tauri/target/release/bundle/**/*.deb
            apps/launcher/src-tauri/target/release/bundle/**/*.AppImage
