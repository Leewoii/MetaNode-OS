services:
  - type: web
    name: metanode-distribution-api
    runtime: docker
    plan: free
    dockerfilePath: ./apps/distribution-api/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_OWNER
        value: Leewoii
      - key: GITHUB_REPO
        value: MetaNode-OS-Core
      - key: GITHUB_RELEASE_TAG
        value: latest
      - key: DISTRIBUTION_SHARED_SECRET
        sync: false
